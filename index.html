<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IronHub - 免費資源分享平台，搜尋下載各類資源檔案。">
  <meta property="og:title" content="IronHub - 資源分享平台">
  <meta property="og:description" content="免費資源分享平台，搜尋下載各類資源檔案。">
  <meta property="og:type" content="website">
  <title>IronHub - 資源分享平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">⬡</div>
        IronHub
      </div>
      <div class="header-info">
        <span class="resource-count">📦 <strong id="totalCount">0</strong> 個資源</span>
        <span>🔍 純搜尋 · 免上傳</span>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs">
    <div class="tabs-inner">
      <button class="tab active" data-tab="resources">📦 資源列表</button>
      <button class="tab" data-tab="sponsors">⭐ 贊助者</button>
    </div>
  </nav>

  <!-- Tab: Resources -->
  <section class="tab-content active" id="tab-resources">
    <!-- Hero -->
    <div class="hero">
      <h1>探索優質資源</h1>
      <p>電子書 · 開發工具 · 設計資源 · 程式碼 — 全部免費下載</p>
      <div class="search-wrapper">
        <div class="search-box">
          <span class="icon">🔍</span>
          <input type="text" id="searchInput" placeholder="搜尋資源名稱、描述或標籤..." autocomplete="off">
          <button class="clear-btn" id="clearBtn" aria-label="清除">✕</button>
          <button class="search-btn" id="searchBtn">搜尋</button>
        </div>
      </div>
    </div>

    <!-- Category Filters -->
    <div class="filters">
      <div class="category-chips" id="categoryChips"></div>
    </div>

    <!-- Results Bar -->
    <div class="results-bar">
      <span id="resultCount"></span>
      <select class="sort-select" id="sortSelect">
        <option value="downloads">最多下載</option>
        <option value="rating">最高評分</option>
        <option value="date">最新添加</option>
        <option value="title">名稱 A-Z</option>
      </select>
    </div>

    <!-- Resource Grid -->
    <div class="resources">
      <div class="grid" id="resourceGrid"></div>
    </div>
  </section>

  <!-- Tab: Sponsors -->
  <section class="tab-content" id="tab-sponsors">
    <div class="sponsors-page">
      <div class="sponsors-hero">
        <h2>⭐ 贊助者</h2>
        <p>感謝以下贊助者支持 IronHub 的營運</p>
      </div>

      <div class="sponsor-card">
        <div class="sponsor-avatar">⛏️</div>
        <div class="sponsor-info">
          <h3>MC原界伺服器</h3>
          <p class="sponsor-desc">一個充滿冒險與創意的 Minecraft 原味生存伺服器，等你來探索！</p>
          <div class="sponsor-links">
            <a href="/orig" class="sponsor-link" target="_blank" rel="noopener">
              <span class="link-icon">🌍</span>
              原界
            </a>
            <a href="/iron" class="sponsor-link" target="_blank" rel="noopener">
              <span class="link-icon">🔗</span>
              iron_127
            </a>
          </div>
        </div>
      </div>

      <div class="sponsor-cta">
        <p>你也想成為贊助者嗎？</p>
        <a href="mailto:sponsor@ironhub.com" class="btn btn-primary">聯絡我們</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>IronHub &mdash; 純資源分享平台 · 所有資源來自網路 · 僅供學習參考</p>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
